<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outils</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;
  --bg2:#ede8de;
  --bg3:#e4ddd0;
  --bg4:#d9d1c2;
  --b:rgba(0,0,0,0.07);
  --b2:rgba(0,0,0,0.13);
  --t:#1e1c18;
  --t2:rgba(30,28,24,0.55);
  --t3:rgba(30,28,24,0.35);
  --ac:#8a7a5a;
  --r:18px; --rl:24px; --rx:32px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'DM Sans',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--t);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  -webkit-font-smoothing:antialiased;
}

.orb {
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
  z-index:0;
}
.orb1 {
  width:600px;height:600px;
  background:radial-gradient(circle,#c8a96e 0%,transparent 70%);
  top:-200px;right:-150px;
  opacity:.18;
}
.orb2 {
  width:500px;height:500px;
  background:radial-gradient(circle,#a8b89a 0%,transparent 70%);
  bottom:-100px;left:-100px;
  opacity:.20;
}

.wrap {
  max-width:560px;
  width:100%;
  position:relative;
  z-index:1;
}

.eyebrow {
  font-size:11px;
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ac);
  margin-bottom:40px;
  animation:up .5s ease both;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card {
  background:var(--bg2);
  border:.5px solid var(--b2);
  border-radius:var(--rx);
  padding:28px 26px 24px;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:background .2s, transform .2s, box-shadow .2s;
  animation:up .5s ease both;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.card:nth-child(2) { animation-delay:.06s }

.card::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events:none;
  border-radius:inherit;
}

.card:hover {
  background:var(--bg3);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.10);
}

.card-icon {
  width:56px;
  height:56px;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:4px;
  flex-shrink:0;
}

.card-icon img,
.card-icon svg {
  width:56px;
  height:56px;
  display:block;
}

.card-name {
  font-size:16px;
  font-weight:400;
  letter-spacing:-.02em;
  color:var(--t);
}

.card-desc {
  font-size:13px;
  color:var(--t2);
  font-weight:300;
  line-height:1.5;
}

.card-arrow {
  margin-top:auto;
  padding-top:12px;
  font-family:'DM Mono', monospace;
  font-size:11px;
  color:var(--t3);
  display:flex;
  align-items:center;
  gap:6px;
  transition:color .2s, gap .2s;
}

.card:hover .card-arrow {
  color:var(--ac);
  gap:10px;
}

@keyframes up {
  from { opacity:0; transform:translateY(12px) }
  to   { opacity:1; transform:translateY(0) }
}

@media(max-width:480px){
  .grid { grid-template-columns:1fr }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="eyebrow">Outils</div>

  <div class="grid">

    <a class="card" href="gestion-patrimoine.html">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="56" height="56">
          <defs>
            <linearGradient id="p-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1C1C1E"/><stop offset="100%" style="stop-color:#141416"/>
            </linearGradient>
            <linearGradient id="p-curveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#C4A882;stop-opacity:0.20"/><stop offset="100%" style="stop-color:#C4A882;stop-opacity:0"/>
            </linearGradient>
            <clipPath id="p-innerClip"><circle cx="512" cy="512" r="445"/></clipPath>
          </defs>
          <rect width="1024" height="1024" rx="224" ry="224" fill="url(#p-bgGrad)"/>
          <rect width="1024" height="1024" rx="224" ry="224" fill="none" stroke="#3A3A3C" stroke-width="1.5" opacity="0.8"/>
          <circle cx="512" cy="512" r="392" fill="none" stroke="rgba(196,168,130,0.12)" stroke-width="26"/>
          <circle cx="512" cy="512" r="392" fill="none" stroke="#C4A882" stroke-width="26" stroke-linecap="round" stroke-dasharray="2463.01" stroke-dashoffset="443.34" transform="rotate(-90 512 512)"/>
          <polygon points="272,630 340,588 390,610 450,555 510,575 565,510 620,530 672,468 752,385 752,700 272,700" fill="url(#p-curveGrad)" clip-path="url(#p-innerClip)"/>
          <polyline points="272,630 340,588 390,610 450,555 510,575 565,510 620,530 672,468 752,385" fill="none" stroke="#C4A882" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="752" cy="385" r="18" fill="#C4A882"/>
        </svg>
      </div>
      <div class="card-name">Portefeuille</div>
      <div class="card-desc">Patrimoine, CTO, PEA et dividendes en un seul endroit.</div>
      <div class="card-arrow">
        Ouvrir
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <a class="card" href="daily-tracker.html">
      <div class="card-icon" style="border: 1.5px solid rgba(0,0,0,0.18); display:flex; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="53" height="53" style="display:block;border-radius:14px;">
          <defs>
            <linearGradient id="d-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#F5EFE4"/><stop offset="100%" style="stop-color:#EDE4D6"/>
            </linearGradient>
            <linearGradient id="d-circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#3A3A3C"/><stop offset="100%" style="stop-color:#2C2C2E"/>
            </linearGradient>
            <filter id="d-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="10" stdDeviation="32" flood-color="#2C2C2E" flood-opacity="0.22"/>
            </filter>
          </defs>
          <rect width="1024" height="1024" rx="224" ry="224" fill="url(#d-bgGrad)"/>
          <rect width="1024" height="1024" rx="224" ry="224" fill="none" stroke="#D4C9BA" stroke-width="1.5" opacity="0.6"/>
          <circle cx="512" cy="512" r="445" fill="url(#d-circleGrad)" filter="url(#d-shadow)"/>
          <circle cx="512" cy="512" r="392" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="26"/>
          <circle cx="512" cy="512" r="392" fill="none" stroke="#C4A882" stroke-width="26" stroke-linecap="round" stroke-dasharray="2463.01" stroke-dashoffset="541.86" transform="rotate(-90 512 512)"/>
          <circle cx="512" cy="512" r="150" fill="#C4A882"/>
          <polyline points="437,515 490,572 597,452" fill="none" stroke="#2C2C2E" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>

        </svg>
      </div>
      <div class="card-name">Daily Tracker</div>
      <div class="card-desc">Habitudes quotidiennes et suivi de progression.</div>
      <div class="card-arrow">
        Ouvrir
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

  </div>
</div>

</body>
</html>
