<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outils</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;
  --bg2:#ede8de;
  --bg3:#e4ddd0;
  --bg4:#d9d1c2;
  --b:rgba(0,0,0,0.07);
  --b2:rgba(0,0,0,0.13);
  --t:#1e1c18;
  --t2:rgba(30,28,24,0.55);
  --t3:rgba(30,28,24,0.35);
  --ac:#8a7a5a;
  --r:18px; --rl:24px; --rx:32px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:'DM Sans',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--t);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  -webkit-font-smoothing:antialiased;
}

.orb {
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  pointer-events:none;
  z-index:0;
}
.orb1 {
  width:600px;height:600px;
  background:radial-gradient(circle,#c8a96e 0%,transparent 70%);
  top:-200px;right:-150px;
  opacity:.18;
}
.orb2 {
  width:500px;height:500px;
  background:radial-gradient(circle,#a8b89a 0%,transparent 70%);
  bottom:-100px;left:-100px;
  opacity:.20;
}

.wrap {
  max-width:560px;
  width:100%;
  position:relative;
  z-index:1;
}

.eyebrow {
  font-size:11px;
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ac);
  margin-bottom:40px;
  animation:up .5s ease both;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card {
  background:var(--bg2);
  border:.5px solid var(--b2);
  border-radius:var(--rx);
  padding:28px 26px 24px;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:background .2s, transform .2s, box-shadow .2s;
  animation:up .5s ease both;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.card:nth-child(2) { animation-delay:.06s }

.card::after {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events:none;
  border-radius:inherit;
}

.card:hover {
  background:var(--bg3);
  transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(0,0,0,0.10);
}

.card-icon {
  width:40px;
  height:40px;
  background:var(--bg3);
  border:.5px solid var(--b2);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:4px;
  flex-shrink:0;
}

.card-icon svg {
  width:18px;
  height:18px;
  color:var(--ac);
}

.card-name {
  font-size:16px;
  font-weight:400;
  letter-spacing:-.02em;
  color:var(--t);
}

.card-desc {
  font-size:13px;
  color:var(--t2);
  font-weight:300;
  line-height:1.5;
}

.card-arrow {
  margin-top:auto;
  padding-top:12px;
  font-family:'DM Mono', monospace;
  font-size:11px;
  color:var(--t3);
  display:flex;
  align-items:center;
  gap:6px;
  transition:color .2s, gap .2s;
}

.card:hover .card-arrow {
  color:var(--ac);
  gap:10px;
}

@keyframes up {
  from { opacity:0; transform:translateY(12px) }
  to   { opacity:1; transform:translateY(0) }
}

@media(max-width:480px){
  .grid { grid-template-columns:1fr }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="eyebrow">Outils</div>

  <div class="grid">

    <a class="card" href="gestion-patrimoine.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h18v4H3z"/><path d="M3 7v13a1 1 0 001 1h16a1 1 0 001-1V7"/><path d="M16 12a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div class="card-name">Portefeuille</div>
      <div class="card-desc">Patrimoine, CTO, PEA et dividendes en un seul endroit.</div>
      <div class="card-arrow">
        Ouvrir
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <a class="card" href="daily-tracker.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
        </svg>
      </div>
      <div class="card-name">Daily Tracker</div>
      <div class="card-desc">Habitudes quotidiennes et suivi de progression.</div>
      <div class="card-arrow">
        Ouvrir
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

  </div>
</div>

</body>
</html>
